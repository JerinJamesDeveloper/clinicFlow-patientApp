name: evlov_ignite
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^12.1.1

  # Functional Programming
  dartz: ^0.10.1

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.18.1
  logger: ^2.0.2+1

  # Permissions
  permission_handler: ^11.0.0

  # Local Notifications
  flutter_local_notifications: ^17.2.4

  # Push Notifications (Firebase)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.19

  # Timezone for scheduled notifications
  timezone: ^0.9.2

  # UUID for generating unique notification IDs
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
